<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="utf-8" />
  <meta content="width=1280, height=720, initial-scale=1.0" name="viewport" />
  <title>Modelo da Placa</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet" />
  <link
    href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=Open+Sans:wght@400;600;700&display=swap"
    rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" />
  <style>
    body {
      margin: 0;
      padding: 0;
      width: 1280px;
      height: 720px;
      overflow: hidden;
      background-color: #f8fafc;
      font-family: 'Open Sans', sans-serif;
    }

    .slide-container {
      width: 1280px;
      height: 720px;
      display: flex;
      flex-direction: column;
      position: relative;
      background-color: #f8fafc;
      overflow: hidden;
    }

    .bg-shape-top {
      position: absolute;
      top: 0;
      right: 0;
      width: 600px;
      height: 600px;
      background-color: #e0f2fe;
      border-radius: 50%;
      transform: translate(30%, -40%);
      z-index: 0;
    }

    .bg-shape-bottom {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 150px;
      background-color: #0077b6;
      clip-path: polygon(0 40%, 100% 80%, 100% 100%, 0% 100%);
      z-index: 0;
      opacity: 0.1;
    }

    .header {
      padding: 40px 60px 10px 60px;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .title-group {
      border-left: 8px solid #fb8500;
      padding-left: 20px;
    }

    .block-label {
      display: block;
      font-family: 'Montserrat', sans-serif;
      font-weight: 700;
      font-size: 14px;
      color: #fb8500;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 5px;
    }

    .main-title {
      font-family: 'Montserrat', sans-serif;
      font-weight: 800;
      font-size: 36px;
      color: #003049;
      margin: 0;
    }

    .content-area {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px 60px 60px 60px;
      z-index: 10;
    }

    .placa-container {
      background-color: #ffffff;
      border-radius: 8px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.2);
      padding: 15px;
      border: 1px solid #cbd5e1;
      max-width: 900px;
      width: 100%;
    }

    .placa-img {
      width: 100%;
      height: auto;
      border-radius: 4px;
      display: block;
      border: 4px solid #fff;
    }
  </style>
</head>

<body>
  <div class="slide-container">
    <div class="bg-shape-top"></div>
    <div class="bg-shape-bottom"></div>
    <div class="header">
      <div class="title-group">
        <span class="block-label">Bloco 4</span>
        <h1 class="main-title">Modelo Visual da Placa Proposta</h1>
      </div>
    </div>
    <div class="content-area">
      <div class="placa-container">
        <img src="assets/placa.png" alt="Proposta da Placa" class="placa-img" />
      </div>
    </div>
  </div>
</body>

</html>
